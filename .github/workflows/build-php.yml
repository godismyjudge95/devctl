name: Build PHP Binaries

# Triggered when a devctl release is published so PHP binaries are attached to
# the same release. Also supports manual dispatch for testing.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build PHP ${{ matrix.php }} (linux-x86_64)
    runs-on: ubuntu-latest

    permissions:
      contents: write  # required to upload release assets

    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3", "8.4"]

    steps:
      - name: Checkout static-php-cli
        uses: actions/checkout@v4
        with:
          repository: crazywhalecc/static-php-cli
          # Use HEAD of main — tracks the latest spc release.
          ref: main

      # spc caches downloaded source tarballs in ./downloads.
      # Key includes the PHP version so each version gets its own cache slot.
      - name: Cache downloaded sources
        uses: actions/cache@v4
        with:
          path: downloads
          key: spc-downloads-${{ matrix.php }}-linux-x86_64-${{ github.run_id }}
          restore-keys: |
            spc-downloads-${{ matrix.php }}-linux-x86_64-

      - name: Check and fix build environment
        run: ./bin/spc-alpine-docker doctor --auto-fix

      - name: Set extensions for PHP version
        id: exts
        run: |
          # swoole requires PHP >= 8.2, exclude it for 8.1
          if [ "${{ matrix.php }}" = "8.1" ]; then
            echo "list=apcu,bcmath,brotli,bz2,calendar,ctype,curl,dba,dom,event,exif,fileinfo,filter,ftp,gd,gmp,iconv,imagick,intl,ldap,libxml,mbregex,mbstring,mysqli,mysqlnd,opcache,openssl,opentelemetry,pcntl,pdo,pdo_mysql,pgsql,phar,posix,protobuf,readline,redis,session,shmop,simplexml,soap,sockets,sodium,sqlite3,sysvmsg,sysvsem,sysvshm,tokenizer,xml,xmlreader,xmlwriter,xsl,xz,zip,zlib,zstd,spx" >> "$GITHUB_OUTPUT"
          else
            echo "list=apcu,bcmath,brotli,bz2,calendar,ctype,curl,dba,dom,event,exif,fileinfo,filter,ftp,gd,gmp,iconv,imagick,intl,ldap,libxml,mbregex,mbstring,mysqli,mysqlnd,opcache,openssl,opentelemetry,pcntl,pdo,pdo_mysql,pgsql,phar,posix,protobuf,readline,redis,session,shmop,simplexml,soap,sockets,sodium,sqlite3,swoole,swoole-hook-mysql,swoole-hook-pgsql,swoole-hook-sqlite,sysvmsg,sysvsem,sysvshm,tokenizer,xml,xmlreader,xmlwriter,xsl,xz,zip,zlib,zstd,spx" >> "$GITHUB_OUTPUT"
          fi

      - name: Download PHP sources and dependency tarballs
        run: |
          ./bin/spc-alpine-docker download \
            --with-php=${{ matrix.php }} \
            --for-extensions=${{ steps.exts.outputs.list }} \
            --prefer-pre-built \
            --ignore-cache-sources=php-src \
            --retry=5

      - name: Build PHP CLI and FPM
        run: |
          ./bin/spc-alpine-docker build \
            ${{ steps.exts.outputs.list }} \
            --build-cli \
            --build-fpm \
            --debug

          # Copy out of Docker-owned buildroot before the container exits.
          # buildroot/bin/ is owned by root (Docker), so we must copy here.
          mkdir -p tmp_dist
          cp buildroot/bin/php     tmp_dist/php-${{ matrix.php }}-cli-linux-x86_64
          cp buildroot/bin/php-fpm tmp_dist/php-${{ matrix.php }}-fpm-linux-x86_64

      - name: Upload binaries to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tmp_dist/php-${{ matrix.php }}-cli-linux-x86_64
            tmp_dist/php-${{ matrix.php }}-fpm-linux-x86_64
